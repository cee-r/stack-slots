<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Slots</title>

    <link href="css.css" rel="stylesheet" />
</head>

<body>
    <main>
        <h1>Stack Slots</h1>
        <!-- Reels -->
        <div class="reels">
            <div class="reel-wrapper">
                <span class="reel-label">Tool</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-0"></div>
                </div>
            </div>
            <div class="reel-wrapper">
                <span class="reel-label">Front-end</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-1"></div>
                </div>
            </div>
            <div class="reel-wrapper">
                <span class="reel-label">Wildcard *</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-2"></div>
                </div>
            </div>
        </div>

        <button class="btn-spin" id="spinBtn" aria-label="Spin the reels">
            SPIN
        </button>
    </main>

    <script src="js.js"></script>
</body>

</html>
