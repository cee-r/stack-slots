<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Slots</title>
    
    <link href="css.css" rel="stylesheet" />

    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "x02bcim545");
  </script>
</head>

<body>
    <main>
        <h1>Stack Slots</h1>
        <!-- Reels -->
        <div class="reels">
            <div class="reel-wrapper">
                <span class="reel-label">Render</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-0"><span class="reel-word"></span></div>
                </div>
            </div>
            <div class="reel-wrapper">
                <span class="reel-label">Design</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-1"><span class="reel-word"></span></div>
                </div>
            </div>
            <div class="reel-wrapper">
                <span class="reel-label">Wildcard</span>
                <div class="reel-track">
                    <div class="reel-inner" id="reel-2"><span class="reel-word"></span></div>
                </div>
            </div>
        </div>

        <button class="btn-spin" id="spinBtn" aria-label="Spin the reels">
            SPIN
        </button>
    </main>

    <script src="js.js"></script>
</body>

</html>
